services:
  app:
    container_name: app
    image: app
    restart: always
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8100:8080"
    env_file:
      - ../queenbee/.env
      - ../beekeeper/.env
    depends_on:
      app_database:
        condition: service_healthy
    environment:
      - APP_API_DATABASE_URL=postgresql://app:app@app_database:5432/app
      - APP_API_PUBLIC_URL=${APP_API_PUBLIC_URL:-https://app.login.no}
      - APP_API_DESKTOP_UPDATES_DIR=/app/data/desktop
    volumes:
      - ${APP_API_DESKTOP_UPDATES_DIR:-./data/desktop}:/app/data/desktop
    mem_limit: 1g
    cpus: "2.0"

  app_database:
    image: postgres:18
    container_name: app_database
    restart: always
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    volumes:
      - app_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      retries: 5
    mem_limit: 1g
    cpus: "2.0"

volumes:
  app_postgres_data:
